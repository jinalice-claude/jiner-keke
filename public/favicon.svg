<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 9 7" shape-rendering="crispEdges">
  <!-- claws -->
  <rect x="0" y="0" width="1" height="1" fill="#C85010"/>
  <rect x="1" y="0" width="1" height="1" fill="#F07830"/>
  <rect x="7" y="0" width="1" height="1" fill="#F07830"/>
  <rect x="8" y="0" width="1" height="1" fill="#C85010"/>
  <!-- row 1 -->
  <rect x="0" y="1" width="1" height="1" fill="#C85010"/>
  <rect x="1" y="1" width="1" height="1" fill="#F4944A"/>
  <rect x="2" y="1" width="5" height="1" fill="#E8651A"/>
  <rect x="7" y="1" width="1" height="1" fill="#F4944A"/>
  <rect x="8" y="1" width="1" height="1" fill="#C85010"/>
  <!-- eyes row -->
  <rect x="0" y="2" width="1" height="1" fill="#F4944A"/>
  <rect x="1" y="2" width="1" height="1" fill="#F4944A"/>
  <rect x="2" y="2" width="1" height="1" fill="#FFFFFF"/>
  <rect x="3" y="2" width="1" height="1" fill="#F0C060"/>
  <rect x="4" y="2" width="1" height="1" fill="#E8651A"/>
  <rect x="5" y="2" width="1" height="1" fill="#F0C060"/>
  <rect x="6" y="2" width="1" height="1" fill="#FFFFFF"/>
  <rect x="7" y="2" width="1" height="1" fill="#F4944A"/>
  <rect x="8" y="2" width="1" height="1" fill="#F4944A"/>
  <!-- pupils -->
  <rect x="2" y="3" width="1" height="1" fill="#1A0A00"/>
  <rect x="3" y="3" width="2" height="1" fill="#E8651A"/>
  <rect x="5" y="3" width="1" height="1" fill="#E8651A"/>
  <rect x="6" y="3" width="1" height="1" fill="#1A0A00"/>
  <rect x="1" y="3" width="1" height="1" fill="#F4944A"/>
  <rect x="7" y="3" width="1" height="1" fill="#F4944A"/>
  <rect x="0" y="3" width="1" height="1" fill="#F4944A"/>
  <rect x="8" y="3" width="1" height="1" fill="#F4944A"/>
  <!-- body -->
  <rect x="0" y="4" width="1" height="1" fill="#F4944A"/>
  <rect x="1" y="4" width="7" height="1" fill="#E8651A"/>
  <rect x="8" y="4" width="1" height="1" fill="#F4944A"/>
  <!-- bottom -->
  <rect x="0" y="5" width="1" height="1" fill="#C85010"/>
  <rect x="1" y="5" width="1" height="1" fill="#F4944A"/>
  <rect x="2" y="5" width="1" height="1" fill="#E8651A"/>
  <rect x="3" y="5" width="1" height="1" fill="#E8651A"/>
  <rect x="4" y="5" width="1" height="1" fill="#B84A0C"/>
  <rect x="5" y="5" width="1" height="1" fill="#E8651A"/>
  <rect x="6" y="5" width="1" height="1" fill="#E8651A"/>
  <rect x="7" y="5" width="1" height="1" fill="#F4944A"/>
  <rect x="8" y="5" width="1" height="1" fill="#C85010"/>
  <!-- feet -->
  <rect x="0" y="6" width="2" height="1" fill="#C85010"/>
  <rect x="2" y="6" width="1" height="1" fill="#F4944A"/>
  <rect x="3" y="6" width="3" height="1" fill="#E8651A"/>
  <rect x="6" y="6" width="1" height="1" fill="#F4944A"/>
  <rect x="7" y="6" width="2" height="1" fill="#C85010"/>
</svg>
